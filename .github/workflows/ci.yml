# ============================================
#  Quikko — CI : Lint + Tests
#  Se déclenche sur chaque push et PR
# ============================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  #  Backend : lint + tests
  # ───────────────────────────────────────────
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Lint (flake8)
        run: |
          cd backend
          python -m flake8 server.py --max-line-length 150 --ignore E402,E501,W503,E302,E303,W291

      - name: Tests unitaires
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: quikko_test
          JWT_SECRET: ci-test-secret-key-for-github-actions
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: testpass123
          EMERGENT_LLM_KEY: ""
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests found, skipping"

      - name: Smoke test — le serveur démarre
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: quikko_ci
          JWT_SECRET: ci-test-secret-key-for-github-actions
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: testpass123
          EMERGENT_LLM_KEY: ""
        run: |
          cd backend
          timeout 15 uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 5
          # Vérifier que le serveur répond
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/auth/me || echo "000")
          echo "Status: $STATUS"
          [ "$STATUS" = "401" ] && echo "✅ Backend opérationnel" || (echo "❌ Backend KO" && exit 1)

  # ───────────────────────────────────────────
  #  Frontend : lint + typecheck + build web
  # ───────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Installer les dépendances
        run: cd frontend && yarn install --frozen-lockfile

      - name: Lint (eslint)
        run: cd frontend && npx expo lint || echo "Lint warnings (non-blocking)"

      - name: Typecheck (tsc)
        run: cd frontend && npx tsc --noEmit || echo "Type warnings (non-blocking)"

      - name: Build web (vérifier la compilation)
        run: cd frontend && npx expo export --platform web
        env:
          EXPO_PUBLIC_BACKEND_URL: http://localhost:8001

  # ───────────────────────────────────────────
  #  Intégration : backend + frontend ensemble
  # ───────────────────────────────────────────
  integration:
    name: Intégration — API E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances backend
        run: |
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/

      - name: Démarrer le backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: quikko_integration
          JWT_SECRET: ci-integration-secret-key
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: testpass123
          EMERGENT_LLM_KEY: ""
        run: |
          cd backend
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 5

      - name: Tests E2E — Auth flow
        run: |
          echo "=== Register ==="
          REGISTER=$(curl -s -X POST http://localhost:8001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI User","email":"ci@test.com","password":"testpass123"}')
          echo "$REGISTER" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'access_token' in d, 'Register failed'; print('✅ Register OK')"

          TOKEN=$(echo "$REGISTER" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "=== Login ==="
          curl -s -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"testpass123"}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert 'access_token' in d; print('✅ Login OK')"

          echo "=== Get Me ==="
          curl -s http://localhost:8001/api/auth/me \
            -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['user']['name']=='CI User'; print('✅ Me OK')"

      - name: Tests E2E — Subjects & Study
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.com","password":"testpass123"}' | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "=== Subjects ==="
          curl -s http://localhost:8001/api/subjects -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['subjects'])>=9; print(f'✅ {len(d[\"subjects\"])} subjects')"

          echo "=== Study Start ==="
          curl -s http://localhost:8001/api/study/start/maths -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['total']>0; print(f'✅ {d[\"total\"]} cards')"

          echo "=== Challenges ==="
          curl -s http://localhost:8001/api/challenges -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['challenges'])==4; print('✅ 4 challenges')"

          echo "=== Referral ==="
          curl -s http://localhost:8001/api/referral/stats -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['referral_code']; print(f'✅ Referral code: {d[\"referral_code\"]}')"

          echo "=== Export ==="
          curl -s http://localhost:8001/api/export/maths -H "Authorization: Bearer $TOKEN" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d['export']['card_count']>0; print(f'✅ Export: {d[\"export\"][\"card_count\"]} cards')"

          echo "=== Classes ==="
          CLASS=$(curl -s -X POST http://localhost:8001/api/classes \
            -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"CI Class","is_private":false}')
          echo "$CLASS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['class']['code']; print(f'✅ Class: {d[\"class\"][\"code\"]}')"
